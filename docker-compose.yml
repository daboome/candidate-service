services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: candidates
      POSTGRES_USER: candidate
      POSTGRES_PASSWORD: candidate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candidate -d candidates"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: candidates
      DB_USER: candidate
      DB_PASSWORD: candidate
    depends_on:
      postgres:
        condition: service_healthy
